<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Idle Universe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="fx"></canvas>

<div class="ui">

  <header>
    <div class="title">⚡ Idle Universe</div>

    <div class="stats">
      💰 <span id="coins">0</span>
      | ⚡ <span id="cps">0</span>/s
      | 👆 <span id="cpc">1</span>
    </div>
  </header>

  <main>

    <button id="core">
      ✨ GENERAR
    </button>

  </main>

  <section id="shop"></section>

</div>

<script src="script.js"></script>
  <button id="menuBtn">☰</button>

<div id="menu" class="hidden">

  <h2>MENU</h2>

  <button onclick="toggleConsole()">💻 Consola</button>
  <button onclick="toggleSettings()">⚙ Config</button>
  <button onclick="resetGame()">🔄 Reset</button>

</div>

<div id="console" class="hidden">

  <div id="consoleLog"></div>

  <input id="consoleInput" placeholder="escribe comando..." />

</div>

<div id="settings" class="hidden">

  <label>
    <input type="checkbox" id="soundToggle" checked>
    Sonido
  </label>

  <label>
    <input type="checkbox" id="vibrationToggle" checked>
    Vibración
  </label>

  </div>
</body>
  </html>
